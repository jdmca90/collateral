<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Reportable — demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
.app[data-theme="light"]{
  --bg:#FAF7F0; --surface:#F0EDE6; --ink:#2E2C2A; --muted:#6B6860; --border:#D8D4CC;
  --accent:#85CCCC; --accent-deep:#3F8F8F; --accent-tint:#E7F4F4; --shadow:rgba(46,44,42,.10);
  --brand:#3F8F8F; --btn-bg:#3F8F8F; --btn-bg-h:#357E7E; --btn-fg:#FFFFFF;
  --mand-bg:#3F8F8F; --mand-fg:#FFFFFF; --lim-bg:#F0A860; --lim-fg:#2E2C2A; --adv-bg:#C9C2B6; --adv-fg:#2E2C2A;
  --tint-mand:#E7F4F4; --tint-lim:#FBEAD6; --tint-adv:#ECE8E0; --tint-adv-line:#D8D4CC;
  --ghost-line:#9FD2D2; --hover:#EDE7DD; --dot:#D8D4CC;
}
.app[data-theme="dark"]{
  --bg:#26241F; --surface:#302D27; --ink:#F2EFE7; --muted:#A8A399; --border:#3F3B33;
  --accent:#85CCCC; --accent-deep:#A9DEDE; --accent-tint:#2C3A3A; --shadow:rgba(0,0,0,.35);
  --brand:#A9DEDE; --btn-bg:#6FC4C4; --btn-bg-h:#82D4D4; --btn-fg:#10201F;
  --mand-bg:#6FC4C4; --mand-fg:#10201F; --lim-bg:#F0A860; --lim-fg:#2E2010; --adv-bg:#7C766B; --adv-fg:#F2EFE7;
  --tint-mand:#2C3A3A; --tint-lim:#3A3022; --tint-adv:#34322B; --tint-adv-line:#4A463E;
  --ghost-line:#4A6E6E; --hover:#3A352E; --dot:#3F3B33;
}
@media (prefers-color-scheme:dark){
  .app[data-theme="auto"]{
    --bg:#26241F; --surface:#302D27; --ink:#F2EFE7; --muted:#A8A399; --border:#3F3B33;
    --accent:#85CCCC; --accent-deep:#A9DEDE; --accent-tint:#2C3A3A; --shadow:rgba(0,0,0,.35);
    --brand:#A9DEDE; --btn-bg:#6FC4C4; --btn-bg-h:#82D4D4; --btn-fg:#10201F;
    --mand-bg:#6FC4C4; --mand-fg:#10201F; --lim-bg:#F0A860; --lim-fg:#2E2010; --adv-bg:#7C766B; --adv-fg:#F2EFE7;
    --tint-mand:#2C3A3A; --tint-lim:#3A3022; --tint-adv:#34322B; --tint-adv-line:#4A463E;
    --ghost-line:#4A6E6E; --hover:#3A352E; --dot:#3F3B33;
  }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
:root{
  --sans:"Calibri Light","Calibri","Hanken Grotesk",system-ui,sans-serif;
  --display:"Gill Sans MT","Gill Sans","Gill Sans Nova","Hanken Grotesk","Segoe UI",sans-serif;
}
.app{
  font-family:var(--sans); color:var(--ink); min-height:100vh; line-height:1.5;
  background-color:var(--bg);
  background-image:radial-gradient(var(--dot) .5px, transparent .5px),radial-gradient(var(--dot) .5px, var(--bg) .5px);
  background-size:28px 28px; background-position:0 0,14px 14px; background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}
.app button{font-family:inherit;cursor:pointer}
.app a{color:inherit;text-decoration:none}
.app input{font-family:inherit}
.app :focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:4px}

.banner{text-align:center;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:var(--surface);border-bottom:1px solid var(--border);padding:7px 16px}

.top{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 22px;background:var(--surface);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:9px;background:none;border:none;padding:0}
.brand-mark{width:30px;height:30px;border-radius:10px;background:var(--btn-bg);color:var(--btn-fg);display:grid;place-items:center}
.brand-word{font-family:var(--display);font-weight:700;font-size:23px;color:var(--brand);font-variant-caps:small-caps;letter-spacing:.01em;line-height:1}
.brand-c{font-size:1.28em}
.top-right{display:flex;align-items:center;gap:13px}
.monitor{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:11.5px;background:var(--bg);border:1px solid var(--border);padding:5px 11px;border-radius:999px}
.theme-btn{width:38px;height:38px;border-radius:999px;border:1px solid var(--border);background:var(--bg);color:var(--muted);display:grid;place-items:center;transition:.2s}
.theme-btn:hover{color:var(--accent-deep);border-color:var(--accent)}

.hero{padding:78px 24px 92px;display:flex;justify-content:center}
.hero-inner{max-width:680px;width:100%;text-align:center}
.hero h1{font-family:var(--display);font-weight:700;font-size:clamp(32px,5vw,52px);letter-spacing:.005em;margin:0 0 16px;color:var(--ink)}
.lede{font-size:17px;color:var(--muted);margin:0 auto 32px;max-width:520px}
.zip-field{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:8px 8px 8px 18px;max-width:540px;margin:0 auto;transition:.2s}
.zip-field:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-tint)}
.zip-field svg{color:var(--muted);flex:none}
.zip-field input{border:none;outline:none;background:none;font-size:17px;flex:1;padding:10px 0;color:var(--ink)}
.zip-go{display:flex;align-items:center;gap:7px;background:var(--btn-bg);color:var(--btn-fg);border:none;border-radius:11px;padding:12px 18px;font-weight:600;font-size:15px;white-space:nowrap;transition:.16s}
.zip-go:hover{background:var(--btn-bg-h)}
.zip-err{color:#b06a2e;font-size:13.5px;margin:11px auto 0;max-width:540px}
.app[data-theme="dark"] .zip-err{color:#F0A860}

.state-chips{display:flex;align-items:center;justify-content:center;gap:9px;flex-wrap:wrap;margin:30px 0 26px}
.chips-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.state-chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:14px;font-weight:600;color:var(--ink);transition:.16s}
.state-chip .zipmono{font-size:11.5px;color:var(--muted);font-weight:400}
.state-chip:hover{border-color:var(--accent);background:var(--accent-tint);color:var(--accent-deep);transform:translateY(-1px)}

.mini-legend{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.mini-tier{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px}
.tier-mand{background:var(--mand-bg);color:var(--mand-fg)}
.tier-lim{background:var(--lim-bg);color:var(--lim-fg)}
.tier-adv{background:var(--adv-bg);color:var(--adv-fg)}

.results{display:grid;grid-template-columns:264px 1fr;align-items:start;max-width:1240px;margin:0 auto}
.rail{position:sticky;top:63px;align-self:start;max-height:calc(100vh - 63px);overflow-y:auto;padding:24px 20px;border-right:1px solid var(--border)}
.rail-state{padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:16px}
.rail-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.rail-name{font-family:var(--display);font-weight:700;font-size:27px;line-height:1.1;margin:3px 0 2px;color:var(--ink)}
.rail-zip{font-size:12px;color:var(--muted);margin-bottom:12px}
.switch{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--ink);transition:.16s}
.switch:hover{border-color:var(--accent);color:var(--accent-deep)}

.search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:9px 12px;margin-bottom:18px}
.search svg{color:var(--muted);flex:none}
.search input{border:none;outline:none;background:none;font-size:13.5px;width:100%;color:var(--ink)}
.filter-group{margin-bottom:18px}
.filter-sub{display:flex;align-items:center;gap:6px;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:9px}
.check{display:flex;align-items:center;gap:8px;font-size:13.5px;padding:4px 0;cursor:pointer;color:var(--ink)}
.check input{accent-color:var(--accent-deep);width:15px;height:15px;flex:none}
.check-sw{width:13px;height:13px;border-radius:4px;flex:none}

.toc{margin-top:4px}
.toc-domain{margin-bottom:13px}
.toc-domain-name{font-size:12.5px;font-weight:700;margin-bottom:5px;color:var(--ink)}
.toc-link{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);padding:4px 0 4px 2px}
.toc-link svg{flex:none;opacity:.5}
.toc-link:hover{color:var(--accent-deep)}

.feed{padding:28px 30px 60px;min-width:0}
.feed-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.feed-head h2{font-family:var(--display);font-weight:700;font-size:25px;margin:0;color:var(--ink)}
.feed-count{font-size:13px;color:var(--muted);margin:3px 0 0}

.tip-wrap{position:relative;display:inline-flex}
.ask-open{display:flex;align-items:center;gap:7px;border-radius:11px;padding:10px 15px;font-weight:600;font-size:14px}
.ask-open.stub{background:var(--bg);color:var(--muted);border:1px dashed var(--border)}
.ask-open.stub:hover{border-color:var(--accent);color:var(--accent-deep)}
.tip-text{position:absolute;top:calc(100% + 8px);right:0;width:266px;background:var(--surface);color:var(--ink);border:1px solid var(--border);border-radius:12px;padding:11px 13px;font-size:12.5px;line-height:1.45;box-shadow:0 8px 24px var(--shadow);opacity:0;visibility:hidden;transform:translateY(-4px);transition:.14s;z-index:30;text-align:left;font-weight:400}
.tip-wrap:hover .tip-text,.tip-wrap:focus-within .tip-text{opacity:1;visibility:visible;transform:none}

.domain-section{margin-bottom:32px}
.domain-banner{margin-bottom:13px}
.domain-banner h3{font-family:var(--display);font-weight:600;font-size:14px;margin:0 0 2px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent-deep)}
.domain-banner p{font-size:13px;color:var(--muted);margin:0}

.card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:12px;padding:17px 19px;margin-bottom:13px;box-shadow:0 1px 2px var(--shadow);transition:transform .18s,box-shadow .18s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 20px var(--shadow)}
.spine-mand{border-left-color:var(--mand-bg)} .spine-lim{border-left-color:var(--lim-bg)} .spine-adv{border-left-color:var(--adv-bg)}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card-head h3{font-family:var(--display);font-weight:600;font-size:18px;margin:0;color:var(--ink)}
.card-head-right{display:flex;align-items:center;gap:9px}
.roadmap{font-size:11px;color:var(--muted);border:1px dashed var(--border);border-radius:999px;padding:3px 9px}
.chip{display:inline-flex;align-items:center;gap:5px;font-weight:700;padding:5px 11px;border-radius:999px;white-space:nowrap}

.layer-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.layer-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:999px;border:1px solid var(--accent);background:var(--accent-tint);color:var(--accent-deep)}
.layer-pill.off{background:transparent;border:1px dashed var(--border);color:var(--muted);text-decoration:line-through;opacity:.7}

.note{font-size:13px;line-height:1.5;border-radius:10px;padding:11px 13px;margin-bottom:13px}
.tint-mand{background:var(--tint-mand);color:var(--ink)} .tint-lim{background:var(--tint-lim);color:var(--ink)}
.tint-adv{background:var(--tint-adv);color:var(--ink);border:1px solid var(--tint-adv-line)}

.how{border-top:1px solid var(--border);padding-top:13px}
.how-label{display:flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
.step{display:flex;gap:10px;margin-bottom:9px;font-size:13.5px;line-height:1.5}
.step-ic{flex:none;width:24px;height:24px;border-radius:8px;background:var(--accent-tint);color:var(--accent-deep);display:grid;place-items:center;margin-top:1px}
.step-layer{display:inline-block;font-weight:700;color:var(--accent-deep);margin-right:7px;font-size:12.5px}

.card-foot{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);margin-top:12px;flex-wrap:wrap}
.card-foot svg{opacity:.6}.card-foot .dot{opacity:.5}

.empty{padding:38px;text-align:center;color:var(--muted);background:var(--surface);border:1px dashed var(--border);border-radius:12px}
.feed-foot{font-size:12px;color:var(--muted);line-height:1.55;background:var(--accent-tint);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-top:6px}

@media (max-width:880px){
  .results{grid-template-columns:1fr}
  .rail{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--border)}
  .feed{padding:22px 18px 50px}
  .tip-text{right:auto;left:0}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

</style>
</head>
